---
# vars file for powertop

_powertop_packages:
  default:
    - powertop

powertop_packages: "{{ _powertop_packages[ansible_facts['distribution']] | default(_powertop_packages['default']) }}"

_powertop_service:
  default: powertop

powertop_service: "{{ _powertop_service[ansible_facts['distribution']] | default(_powertop_service['default']) }}"
